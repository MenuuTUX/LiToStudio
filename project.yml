name: LiToStudio
options:
  bundleIdPrefix: com.litostudio
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

packages:
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift.git
    from: "0.31.4"
  MetalSplatter:
    url: https://github.com/scier/MetalSplatter.git
    revision: 2b965de1934de38dda1c71cf90bf798aa948a14c

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    # Metal 3 for our own shaders. Note: the 4 "constexpr if is a C++17 extension"
    # warnings under Product come from mlx-swift's Steel kernels — package targets
    # don't inherit these settings, so they can't be silenced here. Benign: the
    # kernels compile fine, and at runtime MLX loads weights/mlx.metallib anyway.
    MTL_LANGUAGE_REVISION: Metal30
    MTL_COMPILER_FLAGS: -Wno-c++17-extensions

schemes:
  LiToStudio:
    build:
      targets:
        LiToStudio: all
    run:
      config: Debug
      # Silence macOS system-framework console spam (AppIntents/linkd XPC 4097
      # registration noise — debug-signed apps can't register with Shortcuts;
      # harmless). Our own pipeline logs go through stdout, which is unaffected.
      environmentVariables:
        OS_ACTIVITY_MODE: disable

targets:
  LiToConvertCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/LiToConvertCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.litostudio.litoconvertcore
        PRODUCT_NAME: LiToConvertCore
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES

  LiToKit:
    type: framework
    platform: macOS
    sources:
      - path: Sources/LiToKit
    dependencies:
      - package: mlx-swift
        product: MLX
      - package: mlx-swift
        product: MLXNN
      - package: mlx-swift
        product: MLXFast
      - package: mlx-swift
        product: MLXRandom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.litostudio.litokit
        PRODUCT_NAME: LiToKit
        DEFINES_MODULE: YES
        GENERATE_INFOPLIST_FILE: YES

  LiToStudio:
    type: application
    platform: macOS
    sources:
      - path: Sources/LiToStudio
    dependencies:
      - target: LiToKit
      - target: LiToConvertCore
      - package: MetalSplatter
        product: MetalSplatter
      - package: MetalSplatter
        product: SplatIO
    postBuildScripts:
      - name: Colocate MLX metallib & link weights
        basedOnDependencyAnalysis: false
        script: |
          set -e
          # MLX loads its Metal shaders from `mlx.metallib` next to the executable.
          # Missing on a fresh clone is fine: first-run setup downloads it and the
          # app colocates it itself before the engine starts.
          if [ -f "$SRCROOT/weights/mlx.metallib" ]; then
            MLIB="$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH/mlx.metallib"
            cp -f "$SRCROOT/weights/mlx.metallib" "$MLIB"
            # It sits in Contents/MacOS, so the app's CodeSign step treats it as a nested
            # code object — pre-sign it here or the final codesign fails.
            codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY:--}" "$MLIB"
          fi
          # Expose the (large) checkout weights via a symlink in Resources — no copy.
          ln -sfn "$SRCROOT/weights" "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/weights"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.litostudio.app
        PRODUCT_NAME: LiTo Studio
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: "YES"
    info:
      path: Sources/LiToStudio/Info.plist
      properties:
        CFBundleDisplayName: LiTo Studio
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundlePackageType: "$(PRODUCT_BUNDLE_PACKAGE_TYPE)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
